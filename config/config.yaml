  interpretation_notes: Phase 7d is retina-only. It may produce candidate-level detected/not-detected summaries when local reads are quantified, but it must not run differential expression, infer pathway activation, generalize to whole organism, or claim longevity mechanism.

phase7e_expression_hardening:
  method: conservative hardening of retina RNA-seq expression interpretation before integrated evidence scoring
  phase7d_salmon_quant_summary: results/rnaseq/phase7d_salmon_quant_summary.tsv
  phase7d_fastq_qc: results/rnaseq/phase7d_fastq_qc.tsv
