  report_output: reports/generated/phase8a_expression_evidence_report.md
  tiering_policy: Phase 7e expression support may add tissue-specific support or caveats, but it must not upgrade integrated biological evidence tiers unless orthology, locus identity, domain integrity, cross-resource support, and expression-reference validation are all satisfied in a later scoring step.
  interpretation_notes: Phase 8a is deterministic evidence-table integration. It must not run differential expression, infer pathway activation, generalize retina findings to whole organism, claim causation, or claim longevity mechanism.

phase8b_final_evidence_scoring:
  method: final integrated evidence scoring and tier audit across orthology, locus validation, repeat context, telomere readiness, and hardened expression support
