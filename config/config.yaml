workflow_mode: demo

paths:
  metadata_dir: data/metadata
  results_dir: results
  reports_dir: reports/generated
  logs_dir: logs

analysis_switches:
  run_metadata: true
  run_demo_qc: true
  run_candidate_integration: true
  run_evidence_scoring: true
  run_report: true
  run_busco: false
  run_orthofinder: false
  run_repeat_analysis: false
  run_rnaseq: false
  download_large_genome_fastas: false

tool_parameters:
  fasta:
    ambiguous_protein_residues: ["B", "J", "O", "U", "X", "Z"]
  evidence:
    allowed_tiers: ["Tier 1", "Tier 2", "Tier 3", "Artifact/uncertain"]

orthofinder:
  executable: orthofinder
  input_dir: data/interim/orthofinder_input
  output_dir: results/orthofinder
  minimum_species: 2
  threads: 2
  run_when_ready: false
  algorithm_choice: OrthoFinder 2.5.5 is the selected orthology engine because it infers genome-wide orthogroups from protein FASTA files and is appropriate for multi-species copy-number screening. Default DIAMOND-based sequence search is preferred over BLAST for this first chondrichthyan set because it is much faster at proteome scale while remaining suitable for orthogroup inference.
  notes: OrthoFinder is not run in reference_only mode. Use workflow_mode=orthology after the OrthoFinder binary is available, preferably through the Linux/WSL orthology environment.

candidate_validation:
  high_priority_rescue_genes: [H1F0, FTH1B, TP53, RAD51]
  representative_selection: longest_protein_isoform_per_locus
  domain_check_status: prepare_targets_only
  recommended_domain_methods: InterProScan or HMMER/Pfam with recorded database versions, e-values, and domain coverage.
  rescue_strategy: Reciprocal protein similarity searches first; protein-to-genome alignment only when local genome FASTA and validated query proteins are available.
  notes: This step performs isoform/locus audit and prepares domain/rescue targets. It does not infer domain integrity or gene absence.

domain_validation:
  method: HMMER/Pfam first-pass candidate protein domain validation
  backend: pyhmmer
  pyhmmer_version: 0.12.1
  hmmer_executable: hmmscan
  pfam_hmm: data/raw/references/PFAM/Pfam-A.hmm
  pfam_hmm_gz: data/raw/references/PFAM/Pfam-A.hmm.gz
  pfam_url: https://ftp.ebi.ac.uk/pub/databases/Pfam/current_release/Pfam-A.hmm.gz
  pfam_relnotes: data/raw/references/PFAM/relnotes.txt
  pfam_release: "38.1"
  pfam_retrieval_date: "2026-05-29"
  pfam_hmm_gz_sha256: D3D30C8E6801BFEDECF783408ECC98916F8F1DDA8974C6E51036FCBDD765F591
  pfam_hmm_sha256: A78A42D6FAF265B6BFCA59E8F062D06FAE6083CE2C6E335D7B381F20B82B7903
  threads: 4
  use_cut_ga: true
  max_i_evalue: 1.0e-5
  min_partial_hmm_coverage: 0.20
  min_full_hmm_coverage: 0.70
  recommended_command: pyhmmer hmmscan-compatible scan of data/interim/candidate_validation/representative_candidate_proteins.faa against data/raw/references/PFAM/Pfam-A.hmm; equivalent command-line route is hmmscan --cpu 4 --cut_ga --domtblout results/domains/representative_candidate_proteins.pfam.domtblout --noali data/raw/references/PFAM/Pfam-A.hmm data/interim/candidate_validation/representative_candidate_proteins.faa
  interpretation_notes: DOMAIN_SUPPORTED means at least one qualifying Pfam domain is detected in a representative candidate protein. PARTIAL_DOMAIN means a significant Pfam hit is detected but does not meet full-domain coverage. NO_EXPECTED_DOMAIN_DETECTED is domain evidence uncertainty, not gene absence or loss. InterProScan can be added later as broader independent annotation support.

phase4_annotation_rescue:
  method: targeted reciprocal protein similarity rescue for unresolved high-priority candidates
  backend: pyhmmer_phmmer
  high_priority_genes: [H1F0, FTH1B, TP53, RAD51]
  threads: 4
  max_evalue: 1.0e-5
  min_query_coverage: 0.40
  min_target_coverage: 0.40
  max_queries_per_gene_per_species: 3
  max_forward_hits_per_query: 5
  interpretation_notes: Protein-level rescue candidates are not final gene annotations. They identify focal protein models that require domain review, isoform/locus inspection, and protein-to-genome alignment when genome FASTA is available. Do not infer gene absence from failure to rescue.
  query_patterns:
    H1F0:
      include: ["histone h1.0", "histone h1.0-like", "histone h1.0-b-like"]
      exclude: ["h1.01", "h1.10", "h1.1", "h1.2", "h1.3", "h1.4", "h1.5"]
    FTH1B:
      include: ["ferritin heavy chain b", "ferritin heavy chain b-like"]
      exclude: ["light chain", "middle subunit", "lower subunit", "oocyte"]
    TP53:
      include: ["cellular tumor antigen p53"]
      exclude: ["binding protein", "inducible", "regulated", "tp53rk", "p53 response", "p53-target"]
    RAD51:
      include: ["dna repair protein rad51 homolog 1"]
      exclude: ["homolog 2", "homolog 3", "homolog 4", "associated"]

phase4b_genome_validation:
  method: targeted protein-to-genome validation for Phase 4 rescue candidates
  backend: miniprot_gff
  genome_fasta: data/raw/references/SMIC_TOKYO_GENOME_2025/GCA_056099535.1_ASM5609953v1_genomic.fna.gz
  genome_scope: candidate_scaffolds
  miniprot_executable: tools/miniprot-docker.cmd
  threads: 2
  fail_if_missing_inputs: false
  include_comparator_queries_for_genes_with_protein_rescue: false
  min_query_coverage_for_intact_candidate: 0.70
  min_query_coverage_for_partial_candidate: 0.20
  extra_miniprot_args: []
  recommended_command: tools/miniprot-docker.cmd -t 2 --gff data/interim/annotation_rescue/phase4b_target_scaffolds.fna data/interim/annotation_rescue/phase4b_miniprot_queries.faa > results/rescue/phase4b_miniprot_raw.gff
  interpretation_notes: Phase 4b validates whether rescued or unresolved candidate proteins align to the target genome with interpretable coordinates. The current laptop profile uses candidate_scaffolds mode, extracting scaffolds that already contain protein-level rescue candidates to avoid full-genome Docker memory failure. Genes without candidate regions, such as unresolved TP53, remain not assessable in this limited-scope run. High-coverage miniprot alignments are candidate genome support only and still require manual exon/locus/domain review. Failure to align must not be interpreted as gene absence.

phase4c_locus_review:
  method: structured locus review and targeted TP53 genome search
  review_genes: [H1F0, FTH1B, RAD51]
  min_overlap_fraction_for_same_locus: 0.50
  tp53_genome_fasta: data/raw/references/SMIC_TOKYO_GENOME_2025/GCA_056099535.1_ASM5609953v1_genomic.fna.gz
  miniprot_executable: tools/miniprot-docker.cmd
  threads: 2
  tp53_max_chunk_bases: 250000000
  tp53_work_chunk_fasta: data/interim/annotation_rescue/tp53_active_chunk.fna
  tp53_work_chunk_gff: data/interim/annotation_rescue/tp53_active_chunk.gff
  tp53_work_chunk_stderr: data/interim/annotation_rescue/tp53_active_chunk.stderr.log
  interpretation_notes: Phase 4c inspects candidate miniprot loci, rescued-query Pfam support, overlap among candidate loci, and local coordinates. TP53 is searched separately with the available comparator query against scaffolds selected from Phase 4 forward-hit coordinates, because a blind full-genome chunked pass was unstable on this laptop. No Phase 4c output is a final duplication, absence, inactivation, or mechanism claim without manual review and cross-resource support.

phase4d_consolidation:
  method: conservative consolidation of Phase 4 rescue, domain, locus, and targeted TP53 outputs
  integrated_output: results/evidence/integrated_evidence.tsv
  detailed_output: results/evidence/phase4d_candidate_interpretation.tsv
  base_evidence_snapshot: results/evidence/phase3_integrated_evidence.tsv
  high_priority_genes: [H1F0, FTH1B, TP53, RAD51]
  tiering_policy: Candidate loci with high-coverage miniprot support and Pfam domain support are Tier 2 candidate-locus evidence, not validated duplication or functional evidence. TP53 targeted-search results remain Artifact/uncertain until manually reviewed and replicated with additional queries/resources.
  interpretation_notes: Phase 4d updates the integrated evidence table with conservative high-priority candidate interpretations. It separates resource and validation observations from biological mechanism claims and preserves copy-number, loss, pathway activity, adaptation, and translational relevance as not assessed unless future validation supports them.

phase4e_locus_hardening:
  method: manual-review hardening of high-priority candidate loci from Phase 4c/4d outputs
  locus_output: results/rescue/phase4e_locus_manual_review.tsv
  summary_output: results/rescue/phase4e_gene_hardened_summary.tsv
  evidence_output: results/evidence/phase4e_hardened_evidence.tsv
  high_priority_genes: [H1F0, FTH1B, TP53, RAD51]
  annotation_gff: data/raw/references/SMIC_TOKYO_GENOME_2025/figshare_annotation/greenland shark annotation/complete.genomic.gff
  interpretation_notes: Phase 4e parses existing miniprot/Pfam/locus outputs against the local Figshare annotation GFF to record exact/focal annotation overlap, product-consistent family overlap, candidate-locus spacing, and artifact flags. This is still validation hardening, not proof of duplication, gene function, pathway activity, adaptation, loss, or translational relevance.

phase5_repeat_context:
  method: limited candidate-locus repeat/transposon context using existing repeat annotations only
  candidate_loci: results/rescue/phase4e_locus_manual_review.tsv
  figshare_inventory: data/metadata/figshare_annotation_inventory.tsv
  assembly_report: data/raw/references/SMIC_TOKYO_GENOME_2025/GCA_056099535.1_ASM5609953v1_assembly_report.txt
  resource_status_output: data/metadata/phase5_repeat_resource_status.tsv
  repeat_features_output: results/repeats/phase5_repeat_features.tsv
  locus_context_output: results/repeats/phase5_candidate_locus_repeat_context.tsv
  gene_summary_output: results/repeats/phase5_gene_repeat_context_summary.tsv
  candidate_window_bp: 10000
  filter_to_candidate_windows: true
  sequence_alias_policy: normalize_repeatmasker_genbank_accessions_to_assembly_report_sequence_names
  repeat_annotation_candidates:
    - results/repeats/phase5b/smic_tokyo.repeatmasker.out.gff
  loci_of_interest:
    FTH1B: scaffold_33 ferritin-family candidate cluster from Phase 4e
    H1F0: scaffold_33 linker-histone candidate loci from Phase 4e
    RAD51: scaffold_12 RAD51-family candidate loci from Phase 4e
    TP53: scaffold_247 targeted p53-family candidate locus from Phase 4e
  interpretation_notes: Phase 5 is limited to interval context around Phase 4e candidate loci. It does not run RepeatMasker, RepeatModeler, or de novo repeat discovery. The current configured repeat source is the externally generated Phase 5b RepeatMasker GFF, filtered to candidate windows and interpreted only as artifact/context evidence.

phase5_evidence_integration:
  method: integrate Phase 5 repeat context into evidence as artifact risk only
  base_evidence: results/evidence/phase4d_integrated_evidence.tsv
  phase4e_evidence: results/evidence/phase4e_hardened_evidence.tsv
  phase5_gene_summary: results/repeats/phase5_gene_repeat_context_summary.tsv
  phase5c_gene_qc: results/repeats/phase5c_gene_repeat_qc_summary.tsv
  phase5_evidence_output: results/evidence/phase5_repeat_context_evidence.tsv
  integrated_output: results/evidence/integrated_evidence.tsv
  report_output: reports/generated/phase5_repeat_context_report.md
  tiering_policy: Phase 5 repeat context must not upgrade evidence tiers. It may only preserve or increase artifact-risk caveats for candidate loci with local repeat overlap or repeat-context uncertainty.
  interpretation_notes: Repeat overlap around candidate loci is recorded as artifact/context evidence only, especially for FTH1B, RAD51, and TP53. It does not support repeat-mediated duplication, mechanism, adaptation, pathway activity, causation, or longevity interpretation.

phase5c_repeat_qc:
  method: repeat-context QC hardening using RepeatMasker GFF and .out concordance around Phase 4e candidate windows
  phase5_locus_context: results/repeats/phase5_candidate_locus_repeat_context.tsv
  phase5b_inventory: data/metadata/phase5b_repeat_output_inventory.tsv
  integrity_output: results/repeats/phase5c_repeatmasker_integrity.tsv
  locus_qc_output: results/repeats/phase5c_locus_repeat_qc.tsv
  gene_qc_output: results/repeats/phase5c_gene_repeat_qc_summary.tsv
  report_output: reports/generated/phase5c_repeat_context_qc_report.md
  log_files:
    - logs/phase5b_repeatmasker.stdout.log
    - logs/phase5b_repeatmasker.stderr.log
    - logs/phase5b_repeatmodeler_volume.stdout.log
  high_overlap_fraction_for_artifact_risk: 0.50
  interpretation_notes: Phase 5c streams the RepeatMasker .out file through candidate windows, compares overlap calls with the GFF-derived Phase 5 table, records missing .tbl and signal-9 warnings, and keeps all repeat context as artifact/QC evidence only.

phase5b_repeat_annotation:
  method: optional de novo repeat annotation followed by Phase 5 candidate-locus reanalysis
  status: optional_heavy_external_workflow_not_default
  genome_fasta: data/raw/references/SMIC_TOKYO_GENOME_2025/GCA_056099535.1_ASM5609953v1_genomic.fna.gz
  work_dir: data/interim/repeats/phase5b
  output_dir: results/repeats/phase5b
  repeatmasker_output_dir: results/repeats/phase5b/repeatmasker_raw
  staged_genome_fasta: data/interim/repeats/phase5b/smic_tokyo_genome.fna
  database_name: smic_tokyo
  species_label: Somniosus_microcephalus
  container_strategy: Docker desktop-linux or WSL/Linux; do not run heavy repeat annotation through native Windows Snakemake.
  container_image: dfam/tetools:latest
  container_resolved_digest: sha256:d5e5fb526a44a8fc907698425d08e5a9c3d608e5eb6ff668737655fd4c6db734
  container_verified_at: "2026-06-08"
  container_pin_status: EXPLORATORY_LATEST_IMAGE_RESOLVED_DIGEST_RECORDED
  builddatabase_executable: /opt/RepeatModeler/BuildDatabase
  repeatmodeler_executable: /opt/RepeatModeler/RepeatModeler
  repeatmasker_executable: /opt/RepeatMasker/RepeatMasker
  repeatmodeler_version: 2.0.8
  repeatmasker_version: 4.2.3
  threads: 8
  run_repeatmodeler: manual_external
  run_repeatmasker: manual_external
  repeatmasker_database: TODO_RECORD_DFAM_OR_CONTAINER_DATABASE_VERSION
  custom_library: results/repeats/phase5b/smic_tokyo-families.fa
  repeatmasker_gff: results/repeats/phase5b/smic_tokyo.repeatmasker.out.gff
  repeatmasker_out: results/repeats/phase5b/smic_tokyo.repeatmasker.out
  repeatmasker_tbl: results/repeats/phase5b/smic_tokyo.repeatmasker.tbl
  preflight_output: results/repeats/phase5b_repeat_annotation_preflight.tsv
  plan_output: results/repeats/phase5b_repeat_annotation_plan.tsv
  provenance_output: data/metadata/phase5b_repeat_annotation_provenance.tsv
  output_inventory: data/metadata/phase5b_repeat_output_inventory.tsv
  interpretation_notes: Phase 5b is optional and heavy. It should generate versioned repeat annotations for artifact/context review only. Repeat overlap near candidate loci must not be interpreted as causal, adaptive, functional, or longevity evidence without independent validation.

phase6_telomere:
  method: telomere motif and telomere-gene readiness layer
  genome_fasta: data/raw/references/SMIC_TOKYO_GENOME_2025/GCA_056099535.1_ASM5609953v1_genomic.fna.gz
  resource_id: SMIC_TOKYO_GENOME_2025
  motifs: [TTAGGG, CCCTAA]
  canonical_motif: TTAGGG
  reverse_complement_motif: CCCTAA
  terminal_window_bp: 10000
  min_sequence_length_bp: 1000
  candidate_panel: config/candidate_panels.yaml
  candidate_copy_number: results/orthology/candidate_copy_number.tsv
  candidate_duplication_audit: results/orthology/candidate_duplication_audit.tsv
  integrated_evidence: results/evidence/integrated_evidence.tsv
  motif_scan_output: results/telomere/phase6_telomeric_motif_scan.tsv
  scaffold_end_enrichment_output: results/telomere/phase6_scaffold_end_enrichment.tsv
  telomere_gene_audit_output: results/telomere/phase6_telomere_gene_audit.tsv
  report_output: reports/generated/phase6_telomere_report.md
  interpretation_notes: Phase 6 searches exact canonical telomeric motifs near scaffold ends and audits telomere/shelterin candidate genes using existing orthology/evidence tables. It must not infer telomere length, telomerase activity, rejuvenation, pathway activity, gene absence, or longevity mechanism.

