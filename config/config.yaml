phase7b_expression_quantification_strategy:
  method: candidate expression quantification strategy
  status: strategy_only_no_raw_read_quantification
  phase7a_manifest: data/metadata/rnaseq_manifest.tsv
  phase7a_readiness: results/rnaseq/phase7_rnaseq_readiness.tsv
  phase7a_candidate_expression_plan: results/rnaseq/phase7_candidate_expression_plan.tsv
  candidate_panel: config/candidate_panels.yaml
  candidate_copy_number: results/orthology/candidate_copy_number.tsv
  candidate_isoform_audit: results/validation/candidate_isoform_audit.tsv
  phase4e_gene_summary: results/rescue/phase4e_gene_hardened_summary.tsv
  phase4e_locus_review: results/rescue/phase4e_locus_manual_review.tsv
  annotation_gff: data/raw/references/SMIC_TOKYO_GENOME_2025/figshare_annotation/greenland shark annotation/complete.genomic.gff
  genome_fasta: data/raw/references/SMIC_TOKYO_GENOME_2025/GCA_056099535.1_ASM5609953v1_genomic.fna.gz
  cds_fasta: data/raw/references/SMIC_TOKYO_GENOME_2025/figshare_annotation/greenland shark annotation/complete.cds.fna
  transcriptome_fasta_planned: data/interim/rnaseq/phase7b/smic_tokyo.annotation_transcripts.fna
  tx2gene_planned: data/interim/rnaseq/phase7b/smic_tokyo.tx2gene.tsv
  salmon_index_planned: data/interim/rnaseq/phase7b/salmon_index
  candidate_quantification_matrix_planned: results/rnaseq/phase7b_candidate_expression_matrix.tsv
  reference_strategy_output: results/rnaseq/phase7b_reference_quantification_strategy.tsv
  candidate_quant_map_output: results/rnaseq/phase7b_candidate_quantification_map.tsv
  run_plan_output: results/rnaseq/phase7b_quantification_run_plan.tsv
  report_output: reports/generated/phase7b_quantification_strategy_report.md
  primary_method: Salmon selective-alignment style transcript quantification against an annotation-derived transcript FASTA with genome decoys, followed by candidate-level transcript-to-gene summarization.
  fallback_reference: complete.cds.fna can support a coding-sequence-only pilot map, but it is not the preferred final transcriptome reference because UTR reads are not represented.
  validation_method: Genome-aligned RNA-seq validation with STAR or HISAT2 plus featureCounts/stringent locus review for duplicated, paralogous, repeat-overlapping, or unresolved candidates.
  high_ambiguity_genes: [FTH1B, H1F0, RAD51, TP53]
  interpretation_notes: Phase 7b chooses a quantification strategy and prepares candidate-to-reference mapping. It must not download reads, quantify expression, run differential expression, infer pathway activity, generalize retina findings to whole organism, or claim longevity relevance.

phase7c_expression_reference_validation:
  method: annotation-derived expression-reference construction and candidate quantification input validation
  status: reference_construction_no_raw_read_quantification
  annotation_gff: data/raw/references/SMIC_TOKYO_GENOME_2025/figshare_annotation/greenland shark annotation/complete.genomic.gff
  genome_fasta: data/raw/references/SMIC_TOKYO_GENOME_2025/GCA_056099535.1_ASM5609953v1_genomic.fna.gz
