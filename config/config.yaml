  very_low_mapping_rate_percent: 20.0
  min_detected_runs_for_consistent_retina_support: 2
  min_detection_fraction_for_consistent_retina_support: 0.66
  interpretation_notes: Phase 7e is a deterministic interpretation-hardening layer. It reviews mapping rates, lightweight FASTQ QC, Salmon index caveats, Phase 7c reference ambiguity, Phase 4 locus ambiguity, and Phase 5 repeat-context artifact risk before expression support can be carried into Phase 8. It must not run differential expression, infer pathway activation, generalize retina findings to whole organism, or claim longevity mechanism.

phase8a_expression_integration:
  method: integrate Phase 7e hardened retina expression support into evidence scoring without automatic tier upgrades
  base_evidence: results/evidence/integrated_evidence.tsv
  phase7e_candidate_expression: results/rnaseq/phase7e_candidate_expression_hardened.tsv
