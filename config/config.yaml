  report_output: reports/generated/phase8b_final_evidence_report.md
  tiering_policy: Phase 8b may retain or conservatively downgrade evidence tiers, but it must not upgrade tiers. Tier 1 requires low artifact risk and compatible orthology/locus/expression support. Tier 2 remains plausible but incomplete evidence, with artifact-prone candidates clearly marked for Phase 9 reporting.
  interpretation_notes: Phase 8b is a deterministic pre-reporting audit. It must not create new biological mechanism claims, pathway-activity claims, telomere-length claims, validated duplication claims, causation claims, or human translational claims.

phase9_report_generation:
