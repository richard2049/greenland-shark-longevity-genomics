  validation_scope: Validate transcript FASTA and tx2gene against Phase 7b candidate gene IDs before raw-read download or Salmon quantification.
  interpretation_notes: Phase 7c builds and validates the expression reference. It must not download raw reads, quantify expression, test differential expression, infer pathway activity, or treat reference presence as expression support.

